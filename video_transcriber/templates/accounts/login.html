{% extends 'base.html' %}

{% block content %}

<div class="full-height-center">
  <div class="card shadow-sm border-0 p-4" style="width: 100%; max-width: 420px; border-radius: 20px;">
    
    <h3 class="mb-3 fw-bold text-center">Welcome back</h3>
    <p class="mb-4 text-center text-muted">Login to your account</p>

    {% if form.non_field_errors %}
    <div class="alert alert-danger" role="alert">
        {{form.non_field_errors}}
    </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            {{ form.username }}
        </div>

        <div class="mb-3">
            {{ form.password }}
        </div>

        <div class="d-flex justify-content-between mb-3">
            <a class="small text-muted" href="{% url 'accounts:password_reset' %}">
                Forgot password?
            </a>
        </div>

        <button type="submit" class="btn btn-dark w-100 mb-2">
            Sign in
        </button>

        <div class="text-center">
            <small class="text-muted">
                Don't have an account? 
                <a href="{% url 'accounts:signup' %}">
                    Sign up
                </a>
            </small>
        </div>
        
    </form>
</div>
  
  </div>
</div>
{% endblock %}
