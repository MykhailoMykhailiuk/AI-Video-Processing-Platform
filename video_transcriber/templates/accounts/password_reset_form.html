{% extends 'base.html'%}

{% block content %}

<div class="full-height-center">
  <div class="card p-4 text-center shadow-sm border-0" style="max-width: 400px; border-radius: 20px;">
    
    <h4 class="mb-3">Reset your password</h4>
    <p class="text-muted">Enter your email address and we'll send you a link to reset your password.</p>

    <form method="post">
      {% csrf_token %}

      <div class="mb-3">
        {{ form.email }}
      </div>
      
      <button type="submit" class="btn btn-dark w-100">
        Send reset link
      </button>
    </form>

  </div>
</div>

{% endblock %}
